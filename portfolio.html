    <section class="section section--portfolio-page">

            </div>

            <div class="project-list">


                <!-- Project 1 -------------------------------------------------------->
                <article class="project-card glass animated-item" data-animation="fade-in-up" data-delay="0.2s">
                    <div class="project-card__content">
                        <h2 class="project-title" data-ja="Kyutech Campus Navigator" data-en="Kyutech Campus Navigator">
                        </h2>
                        <p class="project-subtitle" data-ja="大学構内道案内サービス" data-en="Campus Navigation Service"></p>
                        <div class="project-tags">
                            <span class="tag">WEB</span>
                        </div>
                        <div class="project-images">
                            <img src="assets/portfolio/kcn1.png" alt="Campus Navigator Screenshot 1">
                            <img src="assets/portfolio/kcn2.png" alt="Campus Navigator Screenshot 2">
                            <img src="assets/portfolio/kcn3.png" alt="Campus Navigator Screenshot 3">
                        </div>
                        <p class="project-desc"
                            data-ja="九州工業大学戸畑キャンパスに導入させて頂いている道案内アプリです．学生は二次元コードを読み取って大学内の施設や講義室名を入力すると，その場所までの道案内が画像付き（一部360度画像）で表示されます．新入生や新学期が始まる時期やオープンキャンパスなどで多くの学生に利用して頂いております．"
                            data-en="This is a navigation app currently introduced at the Kyutech Tobata Campus. By scanning a 2D code and entering the name of a facility or lecture room, students are guided to their destination with images (including some 360-degree views). It is widely used by many students, especially freshmen, during the start of the new semester and at open campuses.">
                        </p>
                        <div class="project-links">
                            <a href="http://fk-exp.com/kyutech-navi/guide" target="_blank" rel="noopener"
                                class="pill-link disabled">
                                <i class="fa-solid fa-external-link-alt"></i> アプリを見る
                            </a>
                        </div>
                    </div>
                </article>

                <!-- Project 2 -------------------------------------------------------->
                <article class="project-card glass animated-item" data-animation="fade-in-up" data-delay="0.3s">
                    <div class="project-card__content">
                        <h2 class="project-title" data-ja="Stacio" data-en="Stacio"></h2>
                        <p class="project-subtitle" data-ja="駅SNSアプリ" data-en="Station SNS App"></p>
                        <div class="project-tags">
                            <span class="tag">WEB</span>
                            <span class="tag">Android</span>
                        </div>
                        <div class="project-images">
                            <img src="assets/portfolio/stacio1.png" alt="Stacio Screenshot 1">
                            <img src="assets/portfolio/stacio2.webp" alt="Stacio Screenshot 2">
                            <img src="assets/portfolio/stacio3.webp" alt="Stacio Screenshot 3">
                            <img src="assets/portfolio/stacio4.webp" alt="Stacio Screenshot 4">
                            <img src="assets/portfolio/stacio5.webp" alt="Stacio Screenshot 5">
                        </div>
                        <p class="project-desc"
                            data-ja="このアプリは「駅」をテーマとした総合アプリです．主に以下の３つの機能があります．【駅チェックイン機能】スマートフォンの位置情報を用いて近くの駅にチェックインすることができます．【駅コレクション機能】自分がチェックインした駅を一覧で確認することができます．全国全ての鉄道会社に対応しています．【駅投稿機能】駅について投稿することができます．DM機能を使って他ユーザーと交流も可能です．"
                            data-en="This is a comprehensive app themed around 'stations'. It mainly features the following three functions: [Station Check-in] You can check in at nearby stations using your smartphone's location information. [Station Collection] You can view a list of stations you have checked in at. It supports all railway companies nationwide. [Station Post] You can post about stations and interact with other users via the direct message function.">
                        </p>
                        <div class="project-links">
                            <a href="https://stacio.jp/home" target="_blank" rel="noopener"
                                class="pill-link disabled"><i class="fa-solid fa-globe"></i> WEB版</a>
                            <a href="https://play.google.com/store/apps/details?id=jp.stacio.twa" target="_blank"
                                rel="noopener" class="pill-link disabled"><i class="fa-brands fa-google-play"></i>
                                Google
                                Play</a>
                        </div>
                    </div>
                </article>

                <!-- Project 3 -------------------------------------------------------->
                <article class="project-card glass animated-item" data-animation="fade-in-up" data-delay="0.4s">
                    <div class="project-card__content">
                        <h2 class="project-title" data-ja="WRO Calculator" data-en="WRO Calculator"></h2>
                        <p class="project-subtitle" data-ja="ロボット競技会得点集計システム"
                            data-en="Robot Competition Score Calculation System"></p>
                        <div class="project-tags">
                            <span class="tag">WEB</span>
                        </div>
                        <div class="project-images">
                            <img src="assets/portfolio/wro1.png" alt="WRO Calculator Screenshot 1">
                            <img src="assets/portfolio/wro2.png" alt="WRO Calculator Screenshot 2">
                            <img src="assets/portfolio/wro3.png" alt="WRO Calculator Screenshot 3">
                            <img src="assets/portfolio/wro4.png" alt="WRO Calculator Screenshot 4">
                        </div>
                        <p class="project-desc"
                            data-ja="WRO (World Robot Olympiad) の一部の地方予選会及びJapan決勝大会にて，得点集計アプリを導入しました．これにより例年得点集計・順位決定にかかっていた時間を大幅に短縮することに成功しました．また観客の方々に対してロボット競技の結果をリアルタイムにお届けすることができるようになったため，より見応えのある大会にすることができました．"
                            data-en="We introduced a score calculation app at some regional qualifiers and the Japan finals of the WRO (World Robot Olympiad). This successfully and significantly reduced the time conventionally required for score aggregation and ranking determination. Furthermore, by delivering the results of the robotics competition to the audience in real-time, we were able to make the tournament even more spectacular.">
                        </p>
                        <div class="project-links">
                            <a href="#" target="_blank" rel="noopener" class="pill-link disabled">
                                <i class="fa-solid fa-external-link-alt"></i> アプリを見る
                            </a>
                        </div>
                    </div>
                </article>
